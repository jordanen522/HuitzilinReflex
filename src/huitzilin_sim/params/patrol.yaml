patrol:
  ros__parameters:
    # 5 m x 5 m square loop at 2 m altitude (d = -2.0). Keep it inside your world.
    waypoints_ned: [5.0, 0.0, -2.0,
                    5.0, 5.0, -2.0,
                    0.0, 5.0, -2.0,
                    0.0, 0.0, -2.0]
    accept_radius_m: 0.6
    cruise_speed_ms: 1.5
    mode: "position"        # "position" (recommended first) | "velocity"
    loop: true
    autostart: false        # was true — patrol's 10 Hz SET_POSITION_TARGET_LOCAL_NED
                            # setpoints kept overriding the GUIDED takeoff sub-mode,
                            # so the drone never left the ground. Start patrol via
                            # /huitzilin/start_patrol AFTER takeoff instead.
    connection: "udpin:0.0.0.0:14553"   # patrol node needs its own port
